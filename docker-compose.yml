services:
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: 3x-ui
    volumes:
      - ./db/:/etc/x-ui/
      - ./cert/:/root/cert/
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
    network_mode: host
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: vpn-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: vpn-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vpn-net
    ports:
      - "127.0.0.1:8080:8080"

  hysteria2:
    image: tobyxdd/hysteria:latest
    container_name: hysteria2
    command: server -c /etc/hysteria/config.yaml
    volumes:
      - ./hysteria/:/etc/hysteria/
    network_mode: host
    restart: unless-stopped

  caddy:
    image: ghcr.io/iarekylew00t/caddy-cloudflare:latest
    container_name: caddy
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    network_mode: host
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  vpn-net:
    driver: bridge
